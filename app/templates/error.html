<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ error_title or "Error" }} - AWS URL Shortener</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="glow-orb" id="orb1"></div>
    <div class="glow-orb" id="orb2"></div>

    <div class="container error-container">
        <main class="main-card error-card">
            <div class="error-badge">
                <i class="fa-solid fa-triangle-exclamation"></i>
                <span>{{ status_code or "500" }}</span>
            </div>
            <h1>{{ error_title or "An Error Occurred" }}</h1>
            <p class="subtitle">{{ error_msg or "We encountered an issue processing your request. Please try again later." }}</p>
            <div class="error-actions">
                <a href="{{ url_for('index') }}" class="submit-btn">
                    <i class="fa-solid fa-house"></i>
                    <span>Back to Home</span>
                </a>
            </div>
        </main>
    </div>
</body>
</html>
